<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward Dror - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/x-icon" href="assests/images/logo.png">
    <link rel="stylesheet" href="assests/css/login.css">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>
<body class="flex items-center justify-center relative main-body h-full overflow-hidden">

    <div class="absolute top-0 right-0 opacity-100"><img src="assests/images/right-top-image-background.png" alt=""></div>
    <div class="absolute bottom-0 left-0 opacity-100"><img src="assests/images/left-bottom-image-background.png" alt=""></div>

    <main class="relative z-10 w-full h-full max-w-7xl rounded-3xl p-6 md:p-14 shadow-2xl flex flex-col md:flex-row gap-12 items-center main-body-2">
        <div class="flex-1 flex flex-col items-center md:pr-0">
            <a href="login.html"><img src="assests/images/logo.png" alt="Reward Dror Logo" class="mb-0" width="180" height="180"></a>

            <h1 class="text-6xl font-extrabold mb-10 text-[#0077B6] left-logo-heading">
                <span>Reward</span>
                <span class="text-[#FF7F32]">Dror</span>
            </h1>

            <p class="text-5xl font-semibold text-[#0077B6] leading-tight tracking-tight left-description-logo">
                Manage Rewards<br>
                With Ease And<br>
                Precision
            </p>
        </div>

        <div class="w-full max-w-xl rounded-2xl p-8 md:p-20 flex-none self-stretch flex flex-col justify-center login-form-main">            
            <h2 class="text-3xl font-bold text-[#333333] mb-2">Forgot Password</h2>
            <p class="text-[#666666] mb-10">Enter your email address to receive <br>a verification code</p>

            <form action="#" class="space-y-6">
                <div class="space-y-2 form-all-headings">
                    <label for="email" class="block text-sm font-semibold text-[#222222]">
                        Email Address <span class="text-[#FF0000]">*</span>
                    </label>
                    <div class="relative">
                        <input type="email" id="email" name="email" required placeholder="Enter Email"
                        class="w-full px-5 py-3.5 rounded-full focus:ring-2 focus:ring-blue-200 focus:border-blue-400 text-lg text-gray-900 placeholder-gray-400">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full flex justify-center items-center px-6 py-4 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#FF6B3D] login-button-bottom">
                    Continue
                </button>

                <div class="flex-1 flex flex-col items-center md:pr-0">
                    <span><img src="assests/images/left-arrow-blue.svg" alt="left-0"></span>
                </div>
            </form>
        </div>
    </main>

  </body>
</html>
