<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward Dror - New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/x-icon" href="assests/images/logo.png">
    <link rel="stylesheet" href="assests/css/new-password.css">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>
<body class="flex items-center justify-center relative main-body min-h-screen overflow-x-hidden">

    <div class="absolute top-0 right-0 z-0"><img src="assests/images/right-top-image-background.png" alt=""></div>
    <div class="absolute bottom-0 left-0 z-0"><img src="assests/images/left-bottom-image-background.png" alt=""></div>

    <main class="relative z-10 w-full max-w-7xl h-[90vh] rounded-3xl p-6 md:p-14 shadow-2xl flex flex-col md:flex-row gap-8 items-center main-body-2 mx-4">
        
        <div class="flex-1 flex flex-col items-center">
            <a href="login.html">
                <img src="assests/images/logo.png" alt="Reward Dror Logo" width="180" height="180">
            </a>

            <h1 class="text-6xl left-logo-heading text-[#0077B6] mb-5">
                <span>Reward</span>
                <span class="text-[#FF7F32]">Dror</span>
            </h1>

            <p class="text-5xl left-description-logo text-[#0077B6] leading-tight tracking-tight mt-6">
                Manage Rewards<br>
                With Ease And<br>
                Precision
            </p>
        </div>

        <div class="w-full max-w-xl rounded-3xl p-10 md:p-16 flex-none self-stretch flex flex-col justify-center login-form-main">            
            <h2 class="text-[#333333] mb-3">Forgot Password</h2>
            <p class="text-[#666666] mb-10 mt-3">Set New Password for your Account</p>

            <form action="#" class="space-y-5">
                <div class="form-all-headings relative">
                    <label for="otp_coming" class="absolute -top-3 left-6 px-2 z-10 text-[#222222]">
                        New Password <span class="text-[#FF0000]">*</span>
                    </label>
                    <input type="otp_coming" id="otp_coming" name="otp_coming" required placeholder="Enter New Password"
                        class="w-full px-6 py-4 rounded-full outline-none transition-all">
                    <div class="absolute inset-y-0 right-0 pr-5 flex items-center cursor-pointer password-eye">
                        <img src="assests/images/eye-hidden.svg" alt="hidded" class="h-5 w-5">
                    </div>
                </div>

                <div class="form-all-headings relative">
                    <label for="otp_coming" class="absolute -top-3 left-6 px-2 z-10 text-[#222222]">
                        Confirm Password <span class="text-[#FF0000]">*</span>
                    </label>
                    <input type="otp_coming" id="otp_coming" name="otp_coming" required placeholder="Confirm Password*"
                        class="w-full px-6 py-4 rounded-full outline-none transition-all">
                    <div class="absolute inset-y-0 right-0 pr-5 flex items-center cursor-pointer password-eye">
                        <img src="assests/images/eye-hidden.svg" alt="hidded" class="h-5 w-5">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full py-4 transition-transform active:scale-95 login-button-bottom cursor-pointer">
                    <a href="#">Update</a>
                </button>
            </form>
        </div>
    </main>

  </body>
</html>
